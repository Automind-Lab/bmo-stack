version: '3.8'

# This docker-compose file defines OPTIONAL auxiliary services for the BMO Stack.
# The core BMO Stack does NOT require Docker:
#   - Host OpenClaw handles Telegram (runs on host)
#   - Worker sandbox (bmo-tron) is managed by OpenShell/NemoClaw on host
#   - Context lives in ~/bmo-context (outside containers)
#
# If you want to run auxiliary services (e.g., a database for the worker),
# uncomment and configure the services below. Then use `make up`/`make down`.
#
# Example: Redis cache (useful for worker sandbox)
services:
  # redis:
  #   image: redis:7-alpine
  #   container_name: bmo_redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redisdata:/data

volumes:
  redisdata: